services:
  - type: web
    name: vai-voice-agent
    runtime: python
    region: ohio           # US East — low latency for US PSTN callers
    plan: starter          # $25/month, always-on (free tier cold-starts break call latency)
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: TELNYX_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CARTESIA_API_KEY
        sync: false
      - key: CARTESIA_VOICE_ID
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CALCOM_API_KEY
        sync: false
      - key: CALCOM_EVENT_TYPE_ID
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: ESCALATION_EMAIL
        sync: false
      - key: VOICE_AGENT_PUBLIC_URL
        sync: false
